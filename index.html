let db=null;
function setS(m,c){const e=document.getElementById('fbs');e.textContent=m;e.className=c;}
try{
  firebase.initializeApp(firebaseConfig);
  db=firebase.database();
  setS('Connecting...','wt');
  db.ref('.info/connected').on('value',s=>{
    setS(s.val()?'● Live — votes sync between you both':'Reconnecting...',s.val()?'ok':'wt');
  });
}catch(e){setS('Firebase error: '+e.message,'er');}

let ST={screen:'home',user:null,votes:{you:{},wife:{}},filter:'all',tab:'you',search:''};

function esc(k){return k.replace(/\./g,'·').replace(/#/g,'-').replace(/\[/g,'(').replace(/\]/g,')').replace(/\//g,'|');}
function unesc(k){return k.replace(/·/g,'.');}
// ── localStorage helpers (instant load on refresh) ──
function lsSave(u,votes){try{localStorage.setItem('bns_'+u,JSON.stringify(votes));}catch(e){}}
function lsLoad(u){try{const d=localStorage.getItem('bns_'+u);return d?JSON.parse(d):{}}catch(e){return{};}}

// ── Firebase save ──
function fbSave(u,k,v){
  if(!db)return;
  db.ref('votes/'+u+'/'+esc(k)).set(v);
}

// ── Load from localStorage immediately on startup ──
function loadLocal(){
  ST.votes.you=lsLoad('you');
  ST.votes.wife=lsLoad('wife');
}

function fbListen(){
  loadLocal(); // load saved votes instantly before Firebase responds
  render();
  if(!db){return;}
  db.ref('votes').on('value',snap=>{
    const d=snap.val()||{},fbY={},fbW={};
    if(d.you)Object.entries(d.you).forEach(([k,v])=>{fbY[unesc(k)]=v;});
    if(d.wife)Object.entries(d.wife).forEach(([k,v])=>{fbW[unesc(k)]=v;});
    // Firebase is source of truth — update local cache to match
    ST.votes.you=fbY;
    ST.votes.wife=fbW;
    // Keep localStorage in sync
    lsSave('you',fbY);
    lsSave('wife',fbW);
    render();
  });
}

const K=n=>n.name+'::'+n.gender;
const filt=()=>NAMES.filter(n=>ST.filter==='all'||n.gender===ST.filter);
const unvoted=()=>{const uv=ST.votes[ST.user]||{};return filt().filter(n=>!uv[K(n)]);};
const prog=()=>{const f=filt(),uv=ST.votes[ST.user]||{};return{done:f.filter(n=>uv[K(n)]).length,total:f.length};};
const ps=u=>{const f=filt(),uv=ST.votes[u]||{};return f.filter(n=>uv[K(n)]).length+' / '+f.length;};

function vote(dec){
  const q=unvoted();if(!q.length||!ST.user)return;
  const n=q[0],k=K(n);
  ST.votes[ST.user][k]=dec;
  lsSave(ST.user,ST.votes[ST.user]); // save locally immediately
  fbSave(ST.user,k,dec);             // also push to Firebase
  render();
}

function dd(){
  const yu=ST.votes.you||{},wu=ST.votes.wife||{};
  const all=new Set([...Object.keys(yu),...Object.keys(wu)]);
  const M=[],Y=[],W=[],N=[];
  all.forEach(k=>{
    const[name,gender]=k.split('::'),y=yu[k],w=wu[k],e={name,gender};
    if(y==='yes'&&w==='yes')M.push(e);
    else if(y==='yes'&&w!=='yes')Y.push(e);
    else if(w==='yes'&&y!=='yes')W.push(e);
    else if(y==='no'&&w==='no')N.push(e);
  });
  return{M,Y,W,N};
}

function render(){
  const r=document.getElementById('root');
  if(ST.screen==='home')rHome(r);
  else if(ST.screen==='swipe')rSwipe(r);
  else rDash(r);
}

function rHome(r){
  r.innerHTML=`<div class="screen">
  <div class="logo">🍼</div>
  <div class="ttl">Baby Name Swiper</div>
  <div class="sub">Swipe 3,049 names — votes sync live between you both</div>
  <div style="width:100%;max-width:360px">
    <div class="lbl" style="margin-bottom:8px">Who is swiping?</div>
    <div class="ugrid">
      <div class="uc ${ST.user==='you'?'ya':''}" onclick="sel('you')">
        <div class="ui">👤</div><div class="un">You</div>
        <div class="up">${ps('you')} swiped</div>
      </div>
      <div class="uc ${ST.user==='wife'?'wa':''}" onclick="sel('wife')">

        <div class="up">${ps('wife')} swiped</div>

    </div>

  </div>
  <button class="bp" onclick="nav('swipe')" ${!ST.user?'disabled':''}>Start Swiping →</button>
  <button class="bo" onclick="nav('dashboard')">📊 View Dashboard</button>
  </div>`;
}

function rSwipe(r){
  const q=unvoted(),{done,total}=prog();
  if(!q.length){
    r.innerHTML=`<div class="screen">
    <div style="font-size:52px">🎉</div>
    <div style="font-size:22px;font-weight:700;font-family:Georgia,serif">All done!</div>
    <div style="font-size:14px;color:#777">You swiped all ${total} names in this filter.</div>
    <button class="bp" onclick="nav('home')">← Back to Home</button>
    <button class="bo" onclick="nav('dashboard')">📊 Dashboard</button>
    </div>`;return;
  }
  const cur=q[0],boy=cur.gender==='boy';
  const uc=ST.user==='you'?'#185FA5':'#993556';
  const partner=ST.user==='you'?'wife':'you';
  const pL=ST.user==='you'?'Wife':'You';
  const pV=(ST.votes[partner]||{})[K(cur)];
  const hC=pV==='yes'?'hy':pV==='no'?'hn':'h0';
  const hT=pV==='yes'?`♥ ${pL} likes this`:pV==='no'?`✕ ${pL} passed`:`${pL} has not voted yet`;
  const pct=total>0?Math.round(done/total*100):0;
  r.innerHTML=`<div class="screen" style="gap:1rem">
  <div class="sh">
    <div style="font-size:13px;color:#999">Swiping as <strong style="color:${uc}">${ST.user==='you'?'You':'Wife'}</strong></div>
    <button class="bt" onclick="nav('dashboard')">Dashboard →</button>
  </div>
  <div class="pb2"><div class="pf" style="width:${pct}%"></div></div>
  <div style="font-size:12px;color:#ccc">${done} of ${total} swiped</div>
  <div class="cw">
    <div class="nc" id="nc">
      <div class="bdg ${boy?'bb':'bg'}">${boy?'♂ Boy':'♀ Girl'}</div>
      <div class="nb">${cur.name}</div>
      <div class="ph ${hC}">${hT}</div>
      <div class="rm">${q.length} remaining</div>
    </div>
  </div>
  <div class="vr">
    <button class="vb vno" onclick="av('no')">✕</button>
    <div style="font-size:11px;color:#ccc;text-align:center;line-height:1.7">← Pass<br>Like →</div>
    <button class="vb vye" onclick="av('yes')">♥</button>
  </div>
  <div class="ht">Arrow keys also work</div>
  <button class="bo" style="margin-top:.25rem" onclick="nav('home')">← Change user</button>
  </div>`;
}

function rDash(r){
  const d=dd(),t=ST.tab;
  const lists={M:d.M,Y:d.Y,W:d.W,N:d.N};
  const tabMap={match:'M',you:'Y',wife:'W',both:'N'};
  let cur=lists[tabMap[t]]||[];
  if(ST.search){const q=ST.search.toLowerCase();cur=cur.filter(n=>n.name.toLowerCase().includes(q));}
  r.innerHTML=`<div class="dw">
  <div class="dh">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="dt">Results</div>
      <div class="ld">● LIVE</div>
    </div>
    <button class="bo" onclick="nav('home')">← Home</button>
  </div>
  <div class="st">
    <div class="sc"><div class="sn" style="color:#1D9E75">${d.M.length}</div><div class="sl2">Both love it ♥</div></div>
    <div class="sc"><div class="sn" style="color:#185FA5">${d.Y.length}</div><div class="sl2">Only you liked</div></div>
    <div class="sc"><div class="sn" style="color:#993556">${d.W.length}</div><div class="sl2">Only wife liked</div></div>
    <div class="sc"><div class="sn" style="color:#bbb">${d.N.length}</div><div class="sl2">Both passed</div></div>
  </div>
  <div class="tabs">
    <button class="tab ${t==='match'?'on':''}" onclick="setTab('match')">✓ Matches (${d.M.length})</button>
    <button class="tab ${t==='you'?'on':''}" onclick="setTab('you')">Your likes (${d.Y.length})</button>
    <button class="tab ${t==='wife'?'on':''}" onclick="setTab('wife')">Wife's likes (${d.W.length})</button>
    <button class="tab ${t==='both'?'on':''}" onclick="setTab('both')">Both passed (${d.N.length})</button>
  </div>
  <input class="srch" type="text" placeholder="Search names..." value="${ST.search}" oninput="setSr(this.value)">
  <div class="nl">
    ${cur.length===0
      ?'<div class="em">Nothing here yet — keep swiping!</div>'
      :cur.map(n=>{
          const k=n.name+'::'+n.gender,y=(ST.votes.you||{})[k],w=(ST.votes.wife||{})[k];
          return `<div class="nr">
            <div class="nn">${n.name}</div>
            <div class="bdg ${n.gender==='boy'?'bb':'bg'}" style="font-size:10px;padding:3px 10px;flex-shrink:0">${n.gender==='boy'?'♂ Boy':'♀ Girl'}</div>
            <div class="vi">
              <span>You:<span class="${y==='yes'?'vy':y==='no'?'vn':'vp'}">${y==='yes'?'♥':y==='no'?'✕':'—'}</span></span>
              <span>Wife:<span class="${w==='yes'?'vy':w==='no'?'vn':'vp'}">${w==='yes'?'♥':w==='no'?'✕':'—'}</span></span>
            </div>
          </div>`;
        }).join('')}
  </div>
  </div>`;
}

window.sel=u=>{ST.user=u;render();};
window.setF=f=>{ST.filter=f;render();};
window.nav=s=>{ST.screen=s;render();};
window.setTab=t=>{ST.tab=t;render();};
window.setSr=v=>{ST.search=v;render();};
window.av=function(dec){
  const c=document.getElementById('nc');if(!c)return;
  c.classList.add(dec==='yes'?'sr':'sl');
  setTimeout(()=>vote(dec),220);
};
document.addEventListener('keydown',e=>{
  if(ST.screen!=='swipe')return;
  if(e.key==='ArrowRight')av('yes');
  else if(e.key==='ArrowLeft')av('no');
});

fbListen();
</script>
